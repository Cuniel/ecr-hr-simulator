<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ECR 工作台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <main class="app-shell compact-shell">
        <div class="layout-grid">
            <section class="main-stack">
                <!-- 时间显示区域 -->
                <div class="panel time-panel">
                    <div class="time-display">
                        <div class="time-info">
                            <span id="current-date">--</span>
                            <span class="time-separator">·</span>
                            <span class="workday-pill" id="workday-detail">
                                <span class="status-dot" id="system-status"></span>
                                <span id="workday-label">判断中</span>
                            </span>
                        </div>
                        <div class="time-main">
                            <div class="time-value" id="current-time" aria-live="polite">--:--</div>
                        </div>
                        <span class="visually-hidden" id="status-text">正在判断工作日</span>
                    </div>
                </div>

                <div class="panel control-panel">
                    <form id="clockin-form" class="test-form">
                        <div class="form-field saved-account-field" id="saved-account-field" hidden>
                            <label for="saved-account">
                                <i class="fas fa-address-book me-1"></i>本地记录
                            </label>
                            <div class="account-manager">
                                <select class="form-control" id="saved-account" aria-label="选择已保存手机号">
                                    <option value="">选择已保存手机号</option>
                                </select>
                                <button class="btn btn-outline-secondary" type="button" id="delete-account" disabled>
                                    <i class="fas fa-trash-alt me-1"></i>删除
                                </button>
                            </div>
                            <div class="form-text">记录仅保存在当前浏览器，本机可见。</div>
                        </div>

                        <div class="credentials-card" id="credentials-card">
                            <button class="credentials-toggle" type="button" id="credentials-toggle" aria-expanded="true">
                                <span>
                                    <i class="fas fa-user-lock me-2"></i>
                                    登录信息
                                </span>
                                <i class="fas fa-chevron-up"></i>
                            </button>
                            <div class="credentials-body" id="credentials-body">
                                <div class="form-field">
                                    <label for="username">
                                        <i class="fas fa-mobile-alt me-1"></i>手机号
                                    </label>
                                    <input type="text" class="form-control" id="username" name="username"
                                           placeholder="请输入登录手机号" required autocomplete="username">
                                </div>

                                <div class="form-field">
                                    <label for="password">
                                        <i class="fas fa-lock me-1"></i>登录密码
                                    </label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="password" name="password"
                                               placeholder="请输入登录密码" required autocomplete="current-password">
                                        <button class="btn btn-outline-secondary icon-button" type="button" id="toggle-password" title="显示/隐藏密码">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                    <label class="remember-row" for="remember-account">
                                        <input class="form-check-input" type="checkbox" id="remember-account" checked>
                                        <span>记住手机号和密码到本机</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="form-field">
                            <label for="location-select">
                                <i class="fas fa-map-marker-alt me-1"></i>地点
                            </label>
                            <select class="form-control" id="location-select" name="location-select">
                                <option value="custom">自定义坐标</option>
                            </select>
                            <div class="coordinate-grid custom-location-fields" id="custom-location-fields" hidden>
                                <div>
                                    <span>纬度 (Latitude)</span>
                                    <input type="number" class="form-control" id="latitude" name="latitude"
                                           placeholder="31.24" step="0.000001" value="31.24">
                                </div>
                                <div>
                                    <span>经度 (Longitude)</span>
                                    <input type="number" class="form-control" id="longitude" name="longitude"
                                           placeholder="121.42" step="0.000001" value="121.42">
                                </div>
                            </div>
                        </div>

                        <div class="action-section">
                            <div class="action-row">
                                <button type="button" class="btn btn-warning btn-lg" id="test-btn">
                                    <i class="fas fa-flask me-2"></i>测试
                                </button>
                                <button type="button" class="btn btn-success btn-lg" id="clockin-btn">
                                    <i class="fas fa-play-circle me-2"></i>执行
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- 执行结果 -->
                <div class="panel result-panel" id="result-card" hidden>
                    <div class="section-heading">
                        <div>
                            <span class="eyebrow">RESULT</span>
                            <h2>执行结果</h2>
                        </div>
                    </div>
                    <div id="result-content">
                        <!-- 结果内容将通过JavaScript动态插入 -->
                    </div>
                </div>
            </section>

        </div>
    </main>

    <!-- 确认对话框 -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-exclamation-triangle text-warning me-2"></i>
                        确认执行操作
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>注意：</strong>这将执行真实的操作！
                    </div>
                    <p>请确认以下信息：</p>
                    <ul>
                        <li>账号信息已正确填写</li>
                        <li>当前日期已确认适合执行操作</li>
                        <li>坐标位置设置正确</li>
                    </ul>
                    <div class="form-check mt-3">
                        <input class="form-check-input" type="checkbox" id="confirm-checkbox">
                        <label class="form-check-label" for="confirm-checkbox">
                            <strong>我确认要执行真实操作</strong>
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times me-1"></i>取消
                    </button>
                    <button type="button" class="btn btn-success" id="confirm-clockin-btn" disabled>
                        <i class="fas fa-check me-1"></i>确认执行
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载框 -->
    <div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <div class="spinner-border text-primary mb-3" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <h5 id="loading-title">正在处理...</h5>
                    <p id="loading-message" class="text-muted mb-0">请稍候，系统正在执行操作</p>
                    <div class="progress mt-3" style="height: 6px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" id="loading-progress" style="width: 0%"></div>
                    </div>
                    <div class="mt-2">
                        <small class="text-muted">预计需要 30-60 秒</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
