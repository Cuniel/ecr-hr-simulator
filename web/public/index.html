<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动打卡系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- 头部 -->
                <div class="card shadow-sm mt-4">
                    <div class="card-header bg-primary text-white text-center">
                        <h1 class="mb-0">
                            <i class="fas fa-clock me-2"></i>
                            自动打卡系统
                        </h1>
                        <p class="mb-0 mt-2">安全、便捷的在线打卡解决方案</p>
                    </div>
                </div>

                <!-- 系统状态 -->
                <div class="card shadow-sm mt-3">
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-md-3">
                                <div class="status-item">
                                    <i class="fas fa-server text-success fs-2"></i>
                                    <p class="mb-0 mt-2">服务状态</p>
                                    <small id="server-status" class="text-success">在线</small>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="status-item">
                                    <i class="fas fa-clock text-info fs-2"></i>
                                    <p class="mb-0 mt-2">当前时间</p>
                                    <small id="current-time" class="text-muted">--:--:--</small>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="status-item">
                                    <i class="fas fa-history text-warning fs-2"></i>
                                    <p class="mb-0 mt-2">上次执行</p>
                                    <small id="last-execution" class="text-muted">暂无记录</small>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="status-item">
                                    <i class="fas fa-chart-line text-primary fs-2"></i>
                                    <p class="mb-0 mt-2">成功率</p>
                                    <small id="success-rate" class="text-muted">--%</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 打卡表单 -->
                <div class="card shadow-sm mt-3">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-user-circle me-2"></i>
                            账号信息
                        </h5>
                    </div>
                    <div class="card-body">
                        <form id="clockin-form">
                            <div class="mb-3">
                                <label for="username" class="form-label">
                                    <i class="fas fa-user me-1"></i>用户名
                                </label>
                                <input type="text" class="form-control" id="username" name="username" 
                                       placeholder="请输入您的用户名" required>
                                <div class="form-text">请输入系统登录用户名</div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="fas fa-lock me-1"></i>密码
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password" name="password" 
                                           placeholder="请输入您的密码" required>
                                    <button class="btn btn-outline-secondary" type="button" id="toggle-password">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div class="form-text">密码将安全传输，不会保存到服务器</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="fas fa-map-marker-alt me-1"></i>打卡位置
                                </label>
                                <div class="row">
                                    <div class="col-md-6">
                                        <input type="number" class="form-control" id="latitude" name="latitude" 
                                               placeholder="纬度" step="0.000001" value="31.24">
                                    </div>
                                    <div class="col-md-6">
                                        <input type="number" class="form-control" id="longitude" name="longitude" 
                                               placeholder="经度" step="0.000001" value="121.42">
                                    </div>
                                </div>
                                <div class="form-text">
                                    <button type="button" class="btn btn-link btn-sm p-0" id="get-location">
                                        <i class="fas fa-crosshairs me-1"></i>获取当前位置
                                    </button>
                                    <span class="ms-3">默认：上海市普陀区</span>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                                <button type="button" class="btn btn-outline-primary" id="validate-btn">
                                    <i class="fas fa-check-circle me-1"></i>验证账号
                                </button>
                                <button type="button" class="btn btn-warning" id="test-btn">
                                    <i class="fas fa-flask me-1"></i>测试打卡
                                </button>
                                <button type="button" class="btn btn-success" id="clockin-btn" disabled>
                                    <i class="fas fa-play-circle me-1"></i>执行打卡
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 执行结果 -->
                <div class="card shadow-sm mt-3" id="result-card" style="display: none;">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-chart-bar me-2"></i>
                            执行结果
                        </h5>
                    </div>
                    <div class="card-body">
                        <div id="result-content">
                            <!-- 结果内容将通过JavaScript动态插入 -->
                        </div>
                    </div>
                </div>

                <!-- 执行日志 -->
                <div class="card shadow-sm mt-3">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="fas fa-list-alt me-2"></i>
                            执行历史
                        </h5>
                        <button class="btn btn-outline-secondary btn-sm" id="refresh-logs">
                            <i class="fas fa-sync-alt me-1"></i>刷新
                        </button>
                    </div>
                    <div class="card-body">
                        <div id="logs-content">
                            <div class="text-center text-muted">
                                <i class="fas fa-spinner fa-spin me-2"></i>
                                加载中...
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 页脚 -->
                <div class="text-center mt-4 mb-4">
                    <small class="text-muted">
                        <i class="fas fa-shield-alt me-1"></i>
                        您的账号信息经过加密传输，系统不会保存任何敏感信息
                    </small>
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-exclamation-triangle text-warning me-2"></i>
                        确认操作
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>您即将执行<strong>真实打卡</strong>操作，请确认：</p>
                    <ul>
                        <li>账号信息已验证正确</li>
                        <li>已通过测试打卡</li>
                        <li>确认要在当前时间执行打卡</li>
                    </ul>
                    <div class="form-check mt-3">
                        <input class="form-check-input" type="checkbox" id="confirm-checkbox">
                        <label class="form-check-label" for="confirm-checkbox">
                            我已确认上述信息，继续执行打卡操作
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" id="confirm-clockin-btn" disabled>
                        <i class="fas fa-check me-1"></i>确认执行
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载框 -->
    <div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <div class="spinner-border text-primary mb-3" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <h5 id="loading-title">正在处理...</h5>
                    <p id="loading-message" class="text-muted mb-0">请稍候，系统正在执行操作</p>
                    <div class="mt-3">
                        <small class="text-muted">预计需要 30-60 秒</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
